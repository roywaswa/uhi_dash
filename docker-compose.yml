services:
  frontend:
    image: uhi-dashboard-frontend
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    depends_on:
      - backend

  backend:
    image: uhi-dashboard-backend
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file: .env
    volumes:
      - ./secrets:/secrets:ro
      - ./server:/app
    depends_on:
      - db

  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
