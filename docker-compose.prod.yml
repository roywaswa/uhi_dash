services:
  frontend:
    image: uhi-dashboard-frontend
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        # Build-time injection – baked into the Next.js bundle
        NEXT_PUBLIC_API_URL: http://16.171.8.4:8001
    ports:
      - "3001:3000"
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=http://16.171.8.4:8001
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: uhi-dashboard-backend
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file: .env
    volumes:
      - ./secrets:/secrets:ro
      # Remove the ./server:/app volume in production
      # (you don't want live-reload on a server)
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"  # bind to localhost only – not 0.0.0.0
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata: